<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>ammaarhay.at</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      background:#000000;
      color:white;
      font-family:Inter, Arial, sans-serif;
      position:relative;

      display:flex;
      align-items:center;
      justify-content:center;
    }

    .background{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .blob{
      position:absolute;
      width:700px;
      height:700px;
      border-radius:50%;
      filter:blur(140px);
      opacity:0.65;
    }

    .noise{
      position:absolute;
      inset:0;
      opacity:0.03;
      background-image:url("https://grainy-gradients.vercel.app/noise.svg");
    }

    nav{
      position:absolute;
      top:30px;
      left:40px;
      right:40px;

      display:flex;
      justify-content:space-between;
      align-items:center;

      z-index:10;
    }

    .logo{
      font-size:32px;
      font-weight:700;
      letter-spacing:-1px;
      text-decoration:none;
      color:white;
    }

    .dot{
      color:#7a5cff;
    }

    .menu{
      position:relative;
    }

    .menu-button{
      width:46px;
      height:46px;

      border:none;
      border-radius:14px;

      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);

      color:white;
      cursor:pointer;

      font-size:20px;

      transition:0.3s;
    }

    .menu-button:hover{
      background:rgba(255,255,255,0.14);
    }

    .dropdown{
      position:absolute;
      top:60px;
      right:0;

      width:260px;

      background:rgba(15,15,15,0.96);
      backdrop-filter:blur(20px);

      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;

      padding:10px;

      display:none;

      box-shadow:0 20px 50px rgba(0,0,0,0.5);
    }

    .dropdown a{
      display:block;

      padding:14px 16px;

      color:white;
      text-decoration:none;

      border-radius:12px;

      transition:0.25s;
    }

    .dropdown a:hover{
      background:rgba(255,255,255,0.08);
    }

    .dropdown.show{
      display:block;
    }

    .hero{
      position:relative;
      z-index:5;

      text-align:center;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    h1{
      font-size:clamp(5rem, 16vw, 11rem);
      line-height:0.9;
      letter-spacing:-6px;
      font-weight:700;
    }

    p{
      margin-top:24px;
      color:#bdbdbd;
      font-size:1.3rem;
      max-width:700px;
    }

    .arrow{
      margin-top:50px;
      font-size:2rem;
      color:#cfcfcf;
      animation:bounce 2s infinite;
    }

    .socials{
      position:absolute;
      bottom:30px;
      left:40px;

      display:flex;
      gap:24px;

      z-index:10;
    }

    .socials a{
      color:white;
      text-decoration:none;
      opacity:0.7;
      transition:0.3s;
      font-size:14px;
    }

    .socials a:hover{
      opacity:1;
    }

    .footer{
      position:absolute;
      bottom:30px;
      right:40px;

      color:#8f8f8f;
      z-index:10;
      font-size:14px;
    }

    @keyframes bounce{

      0%,100%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(10px);
      }

    }

    @media(max-width:768px){

      h1{
        font-size:5rem;
      }

      p{
        font-size:1rem;
      }

    }

  </style>
</head>

<body>

  <div class="background">

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="noise"></div>

  </div>

  <nav>

    <a href="index.html" class="logo">
      AH<span class="dot">.</span>
    </a>

    <div class="menu">

      <button class="menu-button" id="menuButton">
        ☰
      </button>

      <div class="dropdown" id="dropdown">

        <a href="reformgen.html">
          Reform UK Meme Generator
        </a>

      </div>

    </div>

  </nav>

  <section class="hero">

    <h1>Hello.</h1>

    <p>
      I'm Ammaar Hayat — welcome to my space.
    </p>

    <div class="arrow">
      ↓
    </div>

  </section>

  <div class="socials">

    <a 
      href="https://www.youtube.com/@ammaarh" 
      target="_blank"
    >
      YouTube
    </a>

    <a 
      href="https://www.instagram.com/ammaarhayat/" 
      target="_blank"
    >
      Instagram
    </a>

  </div>

  <div class="footer">
    © 2026 Ammaar Hayat
  </div>

  <script>

    const menuButton = document.getElementById("menuButton");
    const dropdown = document.getElementById("dropdown");

    menuButton.addEventListener("click", () => {
      dropdown.classList.toggle("show");
    });

    window.addEventListener("click", (e) => {

      if(
        !menuButton.contains(e.target) &&
        !dropdown.contains(e.target)
      ){
        dropdown.classList.remove("show");
      }

    });

  </script>

</body>
</html>
